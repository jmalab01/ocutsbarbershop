        * {
            box-sizing: border-box;
        }
        html {
            overflow-x: hidden;
            width: 100%;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-color: #000000;
            color: #ffffff;
        }
        header {
            background: linear-gradient(135deg, #000000 0%, #1a1a1a 100%);

            padding: 0;
            z-index: 1000;
            position: sticky;
            top: 0;
            box-shadow: 0 4px 20px rgba(211, 17, 17, 0.3);
            flex-shrink: 0;
        }
        .header-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 1400px;
            margin: 0 auto;
            padding: 15px 30px;
        }
        .logo-title {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .logo-title img {
            height: 50px;
            width: auto;
        }
        h1 {
            font-size: 1.8rem;
            margin: 0;
            font-weight: 900;
            letter-spacing: 2px;
            background: linear-gradient(45deg, #ffffff, #d31111);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-family: 'Bebas Neue', 'Anton', 'Impact', 'Arial Black', sans-serif;
            text-transform: uppercase;
        }
        nav {
            display: flex;
            gap: 5px;
            background: transparent;
            z-index: 2;
            position: relative;
            flex-shrink: 0;
        }
        nav a {
            color: white;
            padding: 12px 24px;
            text-decoration: none;
            text-align: center;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 1px;
            border-radius: 8px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            font-family: 'Bebas Neue', 'Anton', 'Impact', 'Arial Black', sans-serif;
            text-transform: uppercase;
        }
        nav a::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #d31111, #ffffff);
            transition: width 0.3s ease;
        }
        nav a:hover::before {
            width: 80%;
        }
        nav a:hover {
            background-color: rgba(211, 17, 17, 0.1);
        }
        .content {
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 100%;
        }
        .section-title {
            font-size: 2rem;
            font-weight: 900;
            color: #ffffff;
            margin-bottom: 20px;
            text-align: center;
            font-family: 'Bebas Neue', 'Anton', 'Impact', 'Arial Black', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
            word-wrap: break-word;
        }
        .location-section {
            background-color: #1a1a1a;
            border-radius: 15px;
            padding: 30px;
            margin: 15px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            max-width: 1000px;
            width: calc(100% - 30px);
        }
        .contact-info {
            background-color: #1a1a1a;
            border-radius: 15px;
            padding: 25px;
            margin: 15px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            max-width: 1000px;
            width: calc(100% - 30px);

        .reviews-container {
            background-color: #1a1a1a;
            border-radius: 15px;
            padding: 30px;
            margin: 15px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            max-width: 1000px;
            width: calc(100% - 30px);
        }
        iframe {
            width: 100%;
            height: 400px;
            border: 0;
        }
        .fallback-link {
            color: white;
            text-decoration: underline;
            display: block;
            margin-top: 10px;
        }
        footer {
            background-color: #000000;
            text-align: center;
            padding: 10px;
            width: 100%;
            flex-shrink: 0;
            margin-top: auto;
