        header {

        h1 {
            font-size: 1.8rem;
            margin: 0;
            font-weight: 900;
            letter-spacing: 2px;
            background: linear-gradient(45deg, #ffffff, #d31111);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-family: 'Bebas Neue', 'Anton', 'Impact', 'Arial Black', sans-serif;
            text-transform: uppercase;
        }
        nav {
            display: flex;
            gap: 5px;
            background: transparent;
            z-index: 2;
            position: relative;
            flex-shrink: 0;
        }
        nav a {
            color: white;
            padding: 12px 24px;
            text-decoration: none;
            text-align: center;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 1px;
            border-radius: 8px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            font-family: 'Bebas Neue', 'Anton', 'Impact', 'Arial Black', sans-serif;
            text-transform: uppercase;
        }
        nav a::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 2px;
            background: #d31111;
            transition: all 0.3s ease;
            transform: translateX(-50%);
        }
        nav a:hover {
            background-color: rgba(211, 17, 17, 0.1);
            color: #d31111;
        }
        nav a:hover::before {
            width: 80%;
        }
        .content {
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: auto;
            width: 100%;
            max-width: 100%;
        }
        .slideshow-container {
            position: relative;
            width: 85vw;
            max-width: 900px;
            height: 55vh;
            min-height: 400px;
            max-height: 600px;
            margin: 36px auto 20px auto;
            border: 12px solid transparent;
            border-radius: 16px;
            overflow: hidden;
            background: 
                linear-gradient(#111, #111) padding-box,
                repeating-linear-gradient(
                    45deg,
                    #000000 0px,
                    #000000 15px,
                    #ffffff 15px,
                    #ffffff 30px,
                    #d31111 30px,
                    #d31111 45px
                ) border-box;
            box-shadow: 
                0 0 24px rgba(211, 17, 17, 0.6),
                0 0 48px rgba(211, 17, 17, 0.3),
                inset 0 0 20px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .view-all-btn {
            display: block;
            margin: 18px auto 0 auto;
            padding: 10px 28px;
            background: #d31111;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 2px 8px #d3111133;
            transition: background 0.2s;
        }
        .view-all-btn:hover {
            background: #a00;
        }
        .modal-gallery {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-gallery.active {
            display: flex;
        }
        .modal-gallery-content {
            background: #111;
            border-radius: 16px;
            padding: 32px 18px 18px 18px;
            max-width: 90vw;
            max-height: 90vh;
            overflow: auto;
            box-shadow: 0 0 32px #d31111cc;
        }
        .modal-gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
            padding: 10px;
        }
        .modal-gallery-grid img {
            width: 100%;
            height: 320px;
            object-fit: contain;
            border-radius: 10px;
            border: 3px solid #d31111;
            background: #111;
            box-shadow: 0 2px 12px #d3111133;
        }
        .modal-gallery-close {
            position: absolute;
            top: 18px;
            right: 32px;
            font-size: 2.2em;
            color: #fff;
            background: none;
            border: none;
            cursor: pointer;
            z-index: 1100;
            transition: color 0.2s;
        }
        .modal-gallery-close:hover {
            color: #d31111;
        }
        .slide {
            display: none;
            width: 100%;
            height: 100%;
            object-fit: contain;
            transition: opacity 0.7s ease;
        }
        .active-slide {
            display: block;
            opacity: 1;
        }
        .slideshow-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.7);
            color: #fff;
            border: 2px solid #d31111;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
            cursor: pointer;
            z-index: 2;
            transition: background 0.2s;
        }
        .slideshow-arrow:hover {
            background: #d31111;
            color: #fff;
        }
        .slideshow-arrow.left {
            left: 10px;
        }
        .slideshow-arrow.right {
            right: 10px;
        }
        .slideshow-dots {
            text-align: center;
            position: absolute;
            width: 100%;
            bottom: 12px;
            left: 0;
            z-index: 2;
        }
        .slideshow-dot {
            display: inline-block;
            width: 12px;
            height: 12px;
            margin: 0 4px;
            background: #fff;
            border: 2px solid #d31111;
            border-radius: 50%;
            cursor: pointer;
            opacity: 0.7;
            transition: background 0.2s, opacity 0.2s;
        }
        .slideshow-dot.active {
            background: #d31111;
            opacity: 1;
        }
        .barbershop-pictures {

        .barbershop-pictures img {

                inset 0 0 20px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .barbershop-pictures img:hover {
            transform: scale(1.05);
            box-shadow: 
                0 0 30px rgba(211, 17, 17, 0.8),
                0 0 60px rgba(211, 17, 17, 0.5),
                inset 0 0 20px rgba(0, 0, 0, 0.5);
        }

        /* Walk-In Banner */
        .walkin-banner {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            background: linear-gradient(135deg, #0d0d0d 0%, #1a0000 50%, #0d0d0d 100%);
            border: 2px solid #d31111;
            border-radius: 16px;
            padding: 28px 40px;
            margin: 30px 15px 10px 15px;
            max-width: 800px;
            width: calc(100% - 30px);
            position: relative;
            overflow: hidden;
            box-shadow:
                0 0 20px rgba(211, 17, 17, 0.5),
                0 0 40px rgba(211, 17, 17, 0.3),
                0 0 60px rgba(211, 17, 17, 0.15),
                inset 0 0 30px rgba(211, 17, 17, 0.05);
            animation: bannerPulse 2.5s ease-in-out infinite;
        }
        @keyframes bannerPulse {
            0%, 100% {
                box-shadow:
                    0 0 20px rgba(211, 17, 17, 0.5),
                    0 0 40px rgba(211, 17, 17, 0.3),
                    0 0 60px rgba(211, 17, 17, 0.15),
                    inset 0 0 30px rgba(211, 17, 17, 0.05);
                border-color: #d31111;
            }
            50% {
                box-shadow:
                    0 0 30px rgba(211, 17, 17, 0.9),
                    0 0 60px rgba(211, 17, 17, 0.6),
                    0 0 90px rgba(211, 17, 17, 0.3),
                    inset 0 0 40px rgba(211, 17, 17, 0.1);
                border-color: #ff2222;
            }
        }
        .walkin-banner::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at center, rgba(211,17,17,0.08) 0%, transparent 60%);
            animation: rotateSweep 6s linear infinite;
        }
        @keyframes rotateSweep {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .walkin-scissors {
            font-size: 2.2rem;
            color: #d31111;
            filter: drop-shadow(0 0 8px rgba(211,17,17,0.9));
            animation: scissorGlow 2.5s ease-in-out infinite;
        }
        @keyframes scissorGlow {
            0%, 100% { filter: drop-shadow(0 0 8px rgba(211,17,17,0.9)); }
            50% { filter: drop-shadow(0 0 18px rgba(255,50,50,1)); }
        }
        .walkin-text {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            position: relative;
            z-index: 1;
        }
        .walkin-title {
            font-family: 'Bebas Neue', 'Anton', 'Impact', 'Arial Black', sans-serif;
            font-size: 2.4rem;
            letter-spacing: 4px;
            color: #ffffff;
            text-shadow:
                0 0 10px rgba(211,17,17,1),
                0 0 20px rgba(211,17,17,0.8),
                0 0 40px rgba(211,17,17,0.5);
            animation: titleGlow 2.5s ease-in-out infinite;
        }
        @keyframes titleGlow {
            0%, 100% {
                text-shadow:
                    0 0 10px rgba(211,17,17,1),
                    0 0 20px rgba(211,17,17,0.8),
                    0 0 40px rgba(211,17,17,0.5);
            }
            50% {
                text-shadow:
                    0 0 15px rgba(255,255,255,0.9),
                    0 0 25px rgba(211,17,17,1),
                    0 0 50px rgba(211,17,17,0.8),
                    0 0 80px rgba(211,17,17,0.4);
            }
        }
        .walkin-sub {
            font-size: 0.95rem;
            color: #cccccc;
            letter-spacing: 1px;
            font-style: italic;
        }
        @media (max-width: 600px) {
            .walkin-banner {
                flex-direction: column;
                gap: 10px;
                padding: 20px;
            }
            .walkin-title {
                font-size: 1.8rem;
                letter-spacing: 2px;
            }
            .walkin-sub {
                font-size: 0.82rem;
                text-align: center;
            }
        }
    </style>

    </div>

    <script>
    // Slideshow logic
    const slides = document.querySelectorAll('.slide');
    const dotsContainer = document.getElementById('slideshowDots');
    let currentSlide = 0;
    let slideInterval;

    function showSlide(idx) {
        slides.forEach((slide, i) => {
            slide.classList.toggle('active-slide', i === idx);
        });
        Array.from(dotsContainer.children).forEach((dot, i) => {
            dot.classList.toggle('active', i === idx);
        });
        currentSlide = idx;
    }

    function nextSlide() {
        showSlide((currentSlide + 1) % slides.length);
    }
    function prevSlide() {
        showSlide((currentSlide - 1 + slides.length) % slides.length);
    }

    function startSlideshow() {
        slideInterval = setInterval(nextSlide, 3500);
    }
    function stopSlideshow() {
        clearInterval(slideInterval);
    }

    // Dots
    slides.forEach((_, i) => {
        const dot = document.createElement('span');
        dot.className = 'slideshow-dot' + (i === 0 ? ' active' : '');
        dot.onclick = () => {
            showSlide(i);
            stopSlideshow();
            startSlideshow();
        };
        dotsContainer.appendChild(dot);
    });

    document.getElementById('prevBtn').onclick = () => {
        prevSlide();
        stopSlideshow();
        startSlideshow();
    };
    document.getElementById('nextBtn').onclick = () => {
        nextSlide();
        stopSlideshow();
        startSlideshow();
    };

    startSlideshow();

    // Modal gallery logic
    const viewAllBtn = document.getElementById('viewAllBtn');
    const modalGallery = document.getElementById('modalGallery');
    const closeModalBtn = document.getElementById('closeModalBtn');

    viewAllBtn.onclick = () => {
        modalGallery.classList.add('active');
        document.body.style.overflow = 'hidden';
    };
    closeModalBtn.onclick = () => {
        modalGallery.classList.remove('active');
        document.body.style.overflow = '';
    };
    // Close modal on background click
    modalGallery.onclick = (e) => {
        if (e.target === modalGallery) {
            modalGallery.classList.remove('active');
            document.body.style.overflow = '';
        }
    };
    // Close modal on ESC
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
            modalGallery.classList.remove('active');
            document.body.style.overflow = '';
        }
    });
    </script>
</body>
</html>
